<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>둘의 하루</title>
<style>
  body { margin:0; background:#FAF7F3; font-family: sans-serif; }
  .app { max-width:600px; margin:0 auto; padding:20px; }
  .nav { display: flex; gap: 10px; margin-bottom: 20px; }
  .nav button { padding: 10px; border:none; background:#eee; cursor:pointer; }
  .qcard { background:#fff; padding:20px; border-radius:15px; border:1px solid #ddd; }
</style>
</head>
<body>

<div class="app">
  <h1>둘의 하루</h1>
  <div class="nav">
    <button onclick="switchView('question')">오늘의 질문</button>
  </div>
  <div id="viewRoot"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/12.15.0/firebase-app-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/12.15.0/firebase-firestore-compat.js"></script>
<script>
const QUESTIONS = ["처음 만났을 때 서로에게 반했던 순간은 언제였어?", "요즘 나 때문에 웃었던 순간이 있었어?"];
const firebaseConfig = { /* 동일 */ };
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let myRole = 'rabbit'; // 테스트용
let coupleCode = localStorage.getItem('coupleCode');

function switchView(view) {
  if(view === 'question') {
    document.getElementById('viewRoot').innerHTML = `
      <div class="qcard">
        <h3>오늘의 질문</h3>
        <p>${QUESTIONS[0]}</p>
        <textarea id="ans" placeholder="답변을 입력하세요"></textarea>
        <button onclick="saveAnswer()">저장</button>
      </div>
    `;
  }
}

async function saveAnswer() {
  const val = document.getElementById('ans').value;
  // Firestore 저장 로직 (추후 추가)
  alert('저장되었습니다: ' + val);
}

// 기존 switchView 함수를 아래와 같이 확장
function switchView(view) {
  const root = document.getElementById('viewRoot');
  if(view === 'question') {
    // 기존 질문 로직 유지
    root.innerHTML = `
      <div class="qcard">
        <h3>오늘의 질문</h3>
        <p>${QUESTIONS[0]}</p>
        <textarea id="ans" placeholder="답변을 입력하세요"></textarea>
        <button onclick="saveAnswer()">저장</button>
      </div>
    `;
  } else if(view === 'diary') {
    // 다이어리 탭 렌더링 로직
    root.innerHTML = `
      <div class="qcard">
        <h3>다이어리 작성</h3>
        <textarea id="diaryContent" placeholder="오늘 하루는 어땠나요?"></textarea>
        <button onclick="saveDiary()">일기 저장</button>
        <div id="diaryList"></div>
      </div>
    `;
    loadDiary(); // 일기 목록 불러오기
  }
}

// 다이어리 저장 및 로드
async function saveDiary() {
  const content = document.getElementById('diaryContent').value;
  state.diary.push({ id: Date.now(), content: content, date: todayStr() });
  await saveDiaryState(state.diary);
  alert('일기가 저장되었습니다!');
  loadDiary();
}

function loadDiary() {
  const list = document.getElementById('diaryList');
  list.innerHTML = state.diary.map(e => `<p>${e.content}</p>`).join('');
}
</script>
</body>
</html>
