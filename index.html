<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>둘의 하루</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
:root{
--bg:#FAF7F3;
--card:#FFFFFF;
--ink:#2E2A2E;
--muted:#98929C;
--accent:#E0888F;
--accent-dark:#C96A72;
--accent-soft:#F8E7E8;
--sage:#8CA890;
--gold:#D6A75B;
--border:#ECE6DE;
--shadow:rgba(40,30,35,0.07);
}
*{box-sizing:border-box;}
body{margin:0;background:var(--bg);color:var(--ink);font-family:'Noto Sans KR',sans-serif;min-height:100vh;}
.app{max-width:600px;margin:0 auto;padding:44px 20px 90px;}

.header{text-align:center;}
.header h1{font-family:'Gowun Batang',serif;font-size:28px;color:var(--ink);margin:0 0 6px;letter-spacing:-0.3px;}
.header p{margin:0;font-size:13px;color:var(--muted);}

.profile-row{margin-top:16px;display:flex;flex-direction:column;align-items:center;gap:12px;}
.profile-pair{display:inline-flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--border);border-radius:24px;padding:6px 16px 6px 8px;}
.profile-chip{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--ink);position:relative;}
.profile-chip.mine{cursor:pointer;}
.profile-chip.mine:hover{color:var(--accent-dark);}
.avatar{border-radius:50%;overflow:hidden;display:flex;align-items:center;justify-content:center;background:var(--bg);flex-shrink:0;}
.avatar svg,.avatar img{width:100%;height:100%;object-fit:cover;display:block;}
.profile-sep{color:var(--muted);font-size:12px;}

.status-bubbles-row{display:flex;justify-content:center;gap:24px;width:100%;margin-top:4px;}
.status-container{display:flex;flex-direction:column;align-items:center;position:relative;}
.status-bubble{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:5px 10px;font-size:11px;color:var(--ink);box-shadow:0 2px 8px var(--shadow);position:relative;max-width:120px;text-align:center;word-break:keep-all;}
.status-bubble::after{content:'';position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);border-width:6px 6px 0;border-style:solid;border-color:var(--card) transparent;display:block;width:0;}
.status-bubble::before{content:'';position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);border-width:7px 7px 0;border-style:solid;border-color:var(--border) transparent;display:block;width:0;z-index:-1;}
.status-label{font-size:10px;color:var(--muted);margin-top:8px;font-weight:700;}

.status-selector-box{display:flex;align-items:center;gap:6px;font-size:12px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:4px 10px;color:var(--muted);}
.status-select{border:none;background:none;color:var(--ink);font-family:'Noto Sans KR',sans-serif;font-size:12px;outline:none;cursor:pointer;}

.chip-row{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:12px;}
.chip{display:inline-flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:12px;color:var(--muted);}
.chip b{color:var(--accent-dark);font-family:'Gowun Batang',serif;font-size:13px;}
.chip button{background:none;border:none;color:var(--muted);font-size:11px;text-decoration:underline;cursor:pointer;padding:0;margin-left:2px;}
.mini-chars{display:flex;align-items:center;}
.mini-chars span{margin-right:-7px;display:flex;width:18px;height:18px;}
.mini-chars span:last-child{margin-right:0;}

.journey{margin:26px 6px 6px;position:relative;height:26px;}
.journey-track{position:absolute;left:0;right:0;top:14px;height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.journey-fill{position:absolute;left:0;top:0;height:100%;background:var(--accent);border-radius:2px;}
.journey-chars{position:absolute;top:-6px;transform:translateX(-50%);display:flex;}
.journey-chars .char{width:32px;height:32px;animation:bob 2.6s ease-in-out infinite;}
.journey-chars .char.rabbit{margin-right:-9px;position:relative;z-index:2;}
.journey-chars .char.quokka{animation-delay:.4s;}
@keyframes bob{0%,100%{transform:translateY(0);}50%{transform:translateY(-3px);}}
.journey-caption{margin:14px 0 0;text-align:center;font-size:11px;color:var(--muted);}

.nav{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-top:28px;}
.nav button{flex:1;background:none;border:none;padding:12px 4px 13px;font-size:14px;color:var(--muted);cursor:pointer;position:relative;font-family:'Noto Sans KR',sans-serif;}
.nav button.active{color:var(--ink);font-weight:700;}
.nav button.active::after{content:'';position:absolute;left:16%;right:16%;bottom:-1px;height:2px;background:var(--accent);border-radius:1px;}
.nav button .dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--gold);margin-left:4px;vertical-align:middle;}

.panel{background:var(--card);border-radius:16px;padding:26px 22px;margin-top:16px;box-shadow:0 2px 16px var(--shadow);min-height:280px;}
.view{animation:fade .3s ease;}
@keyframes fade{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}

.qcard{position:relative;border:1px solid var(--border);border-radius:14px;padding:26px 22px;margin-bottom:22px;overflow:hidden;}
.qcard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent);}
.qcard .label{font-size:11px;letter-spacing:1px;color:var(--accent-dark);font-weight:700;text-transform:uppercase;margin-bottom:10px;}
.qcard .qtext{font-family:'Gowun Batang',serif;font-size:20px;line-height:1.5;color:var(--ink);margin:0 0 22px;}
.answers{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.answer-box{display:flex;flex-direction:column;gap:6px;}
.answer-box .who{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:var(--muted);}
.answer-box .who .avatar{width:18px;height:18px;}
.answer-box.mine .who{color:var(--accent-dark);}
.answer-box.partner .who{color:var(--sage);}
.locked-box{background:var(--bg);border-radius:10px;padding:14px;text-align:center;font-size:12.5px;color:var(--muted);display:flex;align-items:center;justify-content:center;min-height:88px;line-height:1.5;}
.answer-readonly{background:var(--bg);border-radius:10px;padding:10px 12px;font-size:14px;line-height:1.6;color:var(--ink);min-height:68px;white-space:pre-wrap;}

textarea,input[type=text]{font-family:'Noto Sans KR',sans-serif;font-size:14px;line-height:1.6;padding:10px 12px;border-radius:10px;border:1px solid var(--border);background:var(--bg);color:var(--ink);width:100%;}
textarea{resize:vertical;min-height:88px;}
textarea:focus,input:focus{outline:none;border-color:var(--accent);}

.btn{font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:700;padding:10px 20px;border-radius:22px;border:none;cursor:pointer;transition:transform .1s,background .15s;}
.btn:active{transform:scale(.97);}
.btn-primary{background:var(--ink);color:#fff;}
.btn-primary:hover{background:#000;}
.btn-danger{background:transparent;color:var(--accent-dark);font-size:12px;padding:4px 8px;}
.qcard-actions{margin-top:18px;text-align:right;}

.past-answers h3,.diary-list h3{font-family:'Gowun Batang',serif;font-size:14px;color:var(--muted);margin:0 0 12px;border-bottom:1px solid var(--border);padding-bottom:8px;font-weight:400;}
.qa-mini{padding:12px 14px;background:var(--bg);border-radius:10px;margin-bottom:8px;font-size:13px;}
.qa-mini .qm-date{color:var(--gold);font-weight:700;font-size:11px;margin-bottom:4px;}
.qa-mini .qm-q{color:var(--ink);font-family:'Gowun Batang',serif;margin-bottom:6px;}
.qa-mini .qm-row{margin-top:2px;}
.qa-mini .qm-row b{color:var(--accent-dark);margin-right:4px;}
.qa-mini .qm-row.partner b{color:var(--sage);}
.qa-mini .qm-locked{color:var(--muted);font-size:12px;}

.composer{margin-bottom:24px;}
.moods{display:flex;gap:8px;margin-bottom:14px;}
.mood-btn{width:38px;height:38px;border-radius:50%;border:1px solid var(--border);background:var(--bg);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:border-color .15s,background .15s;}
.mood-btn.selected{border-color:var(--accent);background:var(--accent-soft);}
.composer input[type=text]{margin-bottom:10px;}
.composer textarea{min-height:100px;}

.photo-row{margin-top:12px;}
.photo-add-btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:20px;border:1px dashed var(--border);background:var(--bg);color:var(--muted);font-family:'Noto Sans KR',sans-serif;font-size:13px;cursor:pointer;}
.photo-add-btn:hover{border-color:var(--accent);color:var(--accent-dark);}
.photo-preview{position:relative;display:inline-block;margin-top:8px;}
/* 💡 [수정] 대규모 이미지 모바일 오버플로우 및 깨짐 현상 차단 CSS 오류 수정 */
.photo-preview img{max-width:100%;max-height:200px;object-fit:contain;border-radius:10px;display:block;border:1px solid var(--border);}
.photo-remove{position:absolute;top:-8px;right:-8px;width:24px;height:24px;border-radius:50%;background:var(--ink);color:#fff;border:2px solid #fff;font-size:13px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;}

.entry-card{background:var(--bg);border-radius:12px;padding:16px 18px;margin-bottom:12px;}
.entry-photo{width:100%;max-height:240px;object-fit:contain;border-radius:8px;margin-bottom:10px;display:block;}
.entry-card .entry-head{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.entry-card .entry-head .avatar{width:20px;height:20px;}
.entry-mood-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.entry-date{font-size:11px;color:var(--muted);font-weight:700;}
.entry-title{font-family:'Gowun Batang',serif;font-size:15px;color:var(--ink);margin:2px 0 6px;}
.entry-content{font-size:14px;line-height:1.6;color:var(--ink);white-space:pre-wrap;}
.entry-content.clamped{display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
.entry-more{font-size:12px;color:var(--accent-dark);cursor:pointer;margin-top:4px;display:inline-block;}
.entry-foot{display:flex;justify-content:flex-end;margin-top:6px;}

.comments{margin-top:12px;border-top:1px solid var(--border);padding-top:10px;}
.comment-item{display:flex;align-items:flex-start;gap:6px;font-size:12.5px;margin-bottom:7px;}
.comment-item .avatar{width:18px;height:18px;margin-top:1px;}
.comment-author{font-weight:700;color:var(--muted);margin-right:4px;}
.comment-input-row{display:flex;gap:6px;margin-top:8px;}
.comment-input-row input{flex:1;font-size:12.5px;padding:8px 10px;}
.comment-send{background:var(--ink);color:#fff;border:none;border-radius:16px;padding:0 14px;font-size:12.5px;cursor:pointer;}

.empty{text-align:center;padding:30px 10px;color:var(--muted);font-size:14px;}

.stats-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:22px;}
.stat-card{background:var(--bg);border-radius:12px;padding:14px 16px;text-align:center;}
.stat-card .num{font-family:'Gowun Batang',serif;font-size:22px;color:var(--ink);}
.stat-card .lbl{font-size:12px;color:var(--muted);margin-top:2px;}
.timeline{position:relative;padding-left:16px;}
.timeline::before{content:'';position:absolute;left:4px;top:6px;bottom:6px;width:1px;background:var(--border);}
.tl-item{position:relative;margin-bottom:14px;}
.tl-item::before{content:'';position:absolute;left:-16px;top:6px;width:8px;height:8px;border-radius:50%;background:var(--accent);border:2px solid var(--card);}
.tl-item.type-answer::before{background:var(--gold);}
.tl-card{background:var(--bg);border-radius:10px;padding:14px 16px;overflow:hidden;}
.tl-type{font-size:11px;font-weight:700;color:var(--accent-dark);text-transform:uppercase;letter-spacing:.4px;}
.tl-item.type-answer .tl-type{color:var(--gold);}
.tl-date{font-size:11px;color:var(--muted);float:right;}
.tl-photo{width:50px;height:50px;object-fit:cover;border-radius:8px;float:right;margin-left:10px;}
.tl-title{font-family:'Gowun Batang',serif;font-size:14px;color:var(--ink);margin-top:4px;}
.tl-body{font-size:13px;color:var(--ink);margin-top:4px;}
.tl-answer-row{font-size:12px;margin-top:6px;}
.tl-answer-row b{margin-right:4px;}
.tl-answer-row.mine b{color:var(--accent-dark);}
.tl-answer-row.partner b{color:var(--sage);}
.tl-comment-count{font-size:11px;color:var(--muted);margin-top:6px;}

.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:12px 22px;border-radius:24px;font-size:13px;box-shadow:0 6px 18px var(--shadow);opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

.overlay{position:fixed;inset:0;background:rgba(30,25,28,0.5);display:none;align-items:center;justify-content:center;z-index:100;padding:20px;}
.overlay-card{background:var(--card);border-radius:18px;padding:30px 26px;max-width:360px;width:100%;box-shadow:0 12px 32px var(--shadow);}
.overlay-card h2{font-family:'Gowun Batang',serif;font-size:19px;color:var(--ink);margin:0 0 8px;text-align:center;}
.overlay-card>p.sub{font-size:13px;color:var(--muted);text-align:center;margin:0 0 20px;}
.tabs{display:flex;gap:6px;margin-bottom:16px;background:var(--bg);padding:4px;border-radius:12px;}
.tabs button{flex:1;padding:8px;border-radius:9px;border:none;background:transparent;font-size:13px;cursor:pointer;color:var(--muted);font-family:'Noto Sans KR',sans-serif;}
.tabs button.active{background:var(--card);color:var(--ink);font-weight:700;box-shadow:0 1px 4px var(--shadow);}
.tab-panel{display:none;}
.tab-panel.active{display:block;}
.code-display-big{font-family:'Gowun Batang',serif;font-size:26px;letter-spacing:5px;text-align:center;color:var(--accent-dark);background:var(--bg);border-radius:12px;padding:16px;margin-bottom:14px;}

.role-pick{display:flex;gap:12px;margin-bottom:6px;}
.role-card{flex:1;border:1px solid var(--border);border-radius:12px;padding:16px 10px;text-align:center;cursor:pointer;background:var(--bg);}
.role-card:hover{border-color:var(--accent);}
.role-card .avatar{width:44px;height:44px;margin:0 auto;}
.role-card .rc-name{font-size:13px;font-weight:700;margin-top:8px;color:var(--ink);}
.role-card .rc-taken{font-size:11px;color:var(--muted);margin-top:2px;}

.profile-form-avatar{width:72px;height:72px;margin:0 auto 14px;cursor:pointer;border:1px solid var(--border);}
.profile-form-avatar.avatar{background:var(--bg);}

@media(max-width:480px){
.answers{grid-template-columns:1fr;}
.panel{padding:20px 16px 24px;}
}
</style>
</head>
<body>
<div class="app">
<div class="header">
<h1>둘의 하루</h1>
<p>매일 한 장씩, 우리를 기록해요</p>
<div class="profile-row" id="profileRow"></div>
<div class="chip-row" id="chipRow"></div>
</div>

<div class="journey" id="journeyRoot"></div>
<div class="journey-caption" id="journeyCaption"></div>

<div class="nav">
<button data-view="question">오늘의 질문<span class="dot" id="dotQ" style="display:none"></span></button>
<button data-view="diary">다이어리<span class="dot" id="dotD" style="display:none"></span></button>
<button data-view="history">우리의 기록</button>
</div>

<div class="panel"><div id="viewRoot"></div></div>
</div>

<div class="toast" id="toast"></div>

<div class="overlay" id="onboardingOverlay">
<div class="overlay-card" id="onboardingCard">
<h2>둘만의 공간 만들기</h2>
<p class="sub">커플 코드로 서로의 기록을 연결해요</p>
<div class="tabs">
<button class="active" data-tab="new" type="button">새로 시작하기</button>
<button data-tab="join" type="button">코드 입력하기</button>
</div>
<div class="tab-panel active" id="panelNew">
<button class="btn btn-primary" id="genCodeBtn" type="button" style="width:100%;">코드 만들기</button>
</div>
<div class="tab-panel" id="panelJoin">
<input type="text" id="joinCodeInput" placeholder="상대에게 받은 코드 입력" style="text-align:center;text-transform:uppercase;letter-spacing:2px;">
<button class="btn btn-primary" id="joinCodeBtn" type="button" style="width:100%;margin-top:10px;">참여하기</button>
</div>
</div>
</div>

<div class="overlay" id="profileOverlay">
<div class="overlay-card" id="profileCard"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/12.15.0/firebase-app-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/12.15.0/firebase-firestore-compat.js"></script>
<script>
const MOODS = [
{key:'happy', emoji:'😊', label:'행복함', color:'#E0888F'},
{key:'calm', emoji:'😌', label:'평온함', color:'#8CA890'},
{key:'excited', emoji:'😍', label:'설레임', color:'#D6A75B'},
{key:'sad', emoji:'😢', label:'우울함', color:'#7C93B0'},
{key:'angry', emoji:'😤', label:'화남', color:'#B57A6A'},
{key:'tired', emoji:'💤', label:'피곤함', color:'#98929C'},
{key:'hungry', emoji:'🍕', label:'배고픔', color:'#D6A75B'},
{key:'missyou', emoji:'🥰', label:'보고싶음', color:'#E0888F'},
{key:'none', emoji:'💬', label:'기분 없음', color:'#ECE6DE'}
];

const QUESTIONS = [
"처음 만났을 때 서로에게 반했던 순간은 언제였어?",
"요즘 나 때문에 웃었던 순간이 있었어?",
"우리가 함께 꼭 가보고 싶은 여행지는 어디야?",
"우리 사이에서 지키고 싶은 약속이 있다면?"
];

const RABBIT_SVG = <svg viewBox="0 0 44 44"&gt;&lt;ellipse cx="15" cy="10" rx="5" ry="14" fill="#FFFFFF" stroke="#ECE6DE" stroke-width="1"/&gt;&lt;ellipse cx="15" cy="11" rx="2.3" ry="9" fill="#F3C4C8"/&gt;&lt;ellipse cx="29" cy="10" rx="5" ry="14" fill="#FFFFFF" stroke="#ECE6DE" stroke-width="1"/&gt;&lt;ellipse cx="29" cy="11" rx="2.3" ry="9" fill="#F3C4C8"/&gt;&lt;circle cx="22" cy="27" r="14" fill="#FFFFFF" stroke="#ECE6DE" stroke-width="1"/&gt;&lt;circle cx="17" cy="25" r="1.6" fill="#2E2A2E"/&gt;&lt;circle cx="27" cy="25" r="1.6" fill="#2E2A2E"/&gt;&lt;ellipse cx="22" cy="29" rx="1.8" ry="1.3" fill="#E0888F"/&gt;&lt;path d="M22 30 Q19 33 16 31" stroke="#2E2A2E" stroke-width="1" fill="none" stroke-linecap="round"/&gt;&lt;path d="M22 30 Q25 33 28 31" stroke="#2E2A2E" stroke-width="1" fill="none" stroke-linecap="round"/&gt;&lt;circle cx="12" cy="29" r="2.6" fill="#F3C4C8" opacity="0.8"/&gt;&lt;circle cx="32" cy="29" r="2.6" fill="#F3C4C8" opacity="0.8"/&gt;&lt;/svg>;
const QUOKKA_SVG = <svg viewBox="0 0 44 44"&gt;&lt;circle cx="10" cy="14" r="5" fill="#D8B888"/&gt;&lt;circle cx="34" cy="14" r="5" fill="#D8B888"/&gt;&lt;circle cx="22" cy="25" r="15" fill="#E0C296"/&gt;&lt;circle cx="16" cy="23" r="1.6" fill="#2E2A2E"/&gt;&lt;circle cx="28" cy="23" r="1.6" fill="#2E2A2E"/&gt;&lt;ellipse cx="22" cy="27" rx="2" ry="1.4" fill="#8A6A44"/&gt;&lt;path d="M15 29 Q22 36 29 29" stroke="#2E2A2E" stroke-width="1.4" fill="none" stroke-linecap="round"/&gt;&lt;circle cx="11" cy="30" r="3" fill="#F3C4C8" opacity="0.7"/&gt;&lt;circle cx="33" cy="30" r="3" fill="#F3C4C8" opacity="0.7"/&gt;&lt;/svg>;
const ANNIVERSARY = new Date(2023, 3, 26);

const firebaseConfig = {
apiKey: "AIzaSyC6HRE4epg8WIaSqzqX-8SrinAAdP73GoI",
authDomain: "my-awesome-couple-diary.firebaseapp.com",
projectId: "my-awesome-couple-diary",
storageBucket: "my-awesome-couple-diary.firebasestorage.app",
messagingSenderId: "321852756524",
appId: "1:321852756524:web:50448dbc69149b265fb789"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
db.settings({ experimentalAutoDetectLongPolling: true });

let state = { diary: [], answers: [], profiles: {} };
let currentView = 'question';
let selectedMood = null;

function formatDate(d){ const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),day=String(d.getDate()).padStart(2,'0'); return ${y}-${m}-${day}; } function displayDate(ds){ const [y,m,d]=ds.split('-'); return ``${y}.${m}.${d}; }
function dayOfYear(d){ const start=new Date(d.getFullYear(),0,0); return Math.floor((d-start)/86400000); }
function todayStr(){ return formatDate(new Date()); }
function todayQuestionIndex(){
const totalQuestions = (Array.isArray(QUESTIONS) && QUESTIONS.length > 0) ? QUESTIONS.length : 4;
return dayOfYear(new Date()) % totalQuestions;
}

/* 💡 [보안 완화] 강력한 XSS 스크립팅 원천 차단 */
function escapeHtml(str){
if(!str) return '';
return str.replace(/&/g,'&').replace(/</g,'<').replace(/>/g,'>').replace(/"/g,'"').replace(/'/g,''').replace(/\n/g,'<br>');
}

}
function resizeImage(file){
return new Promise((resolve, reject)=>{
const reader = new FileReader();
reader.onload = (e)=>{
const img = new Image();
img.onload = ()=>{
const maxDim = 1000;
let {width, height} = img;
if(width > height && width > maxDim){ height = Math.round(height*(maxDim/width)); width = maxDim; }
else if(height > maxDim){ width = Math.round(width*(maxDim/height)); height = maxDim; }
const canvas = document.createElement('canvas');
canvas.width = width; canvas.height = height;
canvas.getContext('2d').drawImage(img, 0, 0, width, height);
resolve(canvas.toDataURL('image/jpeg', 0.72));
};
img.onerror = reject;
img.src = e.target.result;
};
reader.onerror = reject;
reader.readAsDataURL(file);
});
}
function resizeImageSquare(file){
return new Promise((resolve, reject)=>{
const reader = new FileReader();
reader.onload = (e)=>{
const img = new Image();
img.onload = ()=>{
const size = 240;
const canvas = document.createElement('canvas');
canvas.width = size; canvas.height = size;
const ctx = canvas.getContext('2d');
const minSide = Math.min(img.width, img.height);
const sx = (img.width-minSide)/2, sy=(img.height-minSide)/2;
ctx.drawImage(img, sx, sy, minSide, minSide, 0, 0, size, size);
resolve(canvas.toDataURL('image/jpeg', 0.8));
};
img.onerror = reject;
img.src = e.target.result;
};
reader.onerror = reject;
reader.readAsDataURL(file);
});
}

function genCode(){
const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
let code = '';
for(let i=0;i<6;i++) code += chars[Math.floor(Math.random()*chars.length)];
return code;
}

/* 💡 [방어 완비] 트랜잭션을 통한 중복 코드 생성 에러 원천 차단 */
async function createCoupleDoc(code){
const docRef = db.collection('couples').doc(code);
await db.runTransaction(async (transaction) => {
const sfDoc = await transaction.get(docRef);
if (sfDoc.exists) {
throw new Error("중복된 코드가 존재합니다. 다시 시도하세요.");
}
transaction.set(docRef, { answers: [], profiles: {} });
});
}

async function fetchCoupleProfiles(code){
const snap = await db.collection('couples').doc(code).get();
if(!snap.exists) throw new Error('코드를 찾을 수 없어요');
const data = snap.data() || {};
return data.profiles || {};
}

/* 💡 [누락 수정] 기존 잔여 리스너를 완전히 청소 해제하는 unsubscribe 로직 정상화 */
function subscribeCouple(code){
if(unsubscribeCouple) { unsubscribeCouple(); unsubscribeCouple = null; }
if(unsubscribeDiary) { unsubscribeDiary(); unsubscribeDiary = null; }

unsubscribeCouple = db.collection('couples').doc(code).onSnapshot(
(snap)=>{
if (snap.metadata.hasPendingWrites || Date.now() - lastLocalWriteTime < 1000) return;
const data = snap.data() || {};
state.answers = data.answers || [];
const serverProfiles = data.profiles || {};
if(myRole && state.profiles[myRole] && state.profiles[myRole].name) {
serverProfiles[myRole] = Object.assign({}, serverProfiles[myRole], state.profiles[myRole]);
}
state.profiles = serverProfiles;
updateChips();
renderProfileRow();
render();
},
(err)=>{ console.error('실시간 동기화 오류', err); }
);

unsubscribeDiary = db.collection('couples').doc(code).collection('diaries').orderBy('serverCreatedAt', 'desc').onSnapshot(
(qSnap) => {
const diaryArray = [];
qSnap.forEach(doc => { diaryArray.push(doc.data()); });
state.diary = diaryArray;
render();
},
(err) => { console.error('다이어리 동기화 오류', err); }
);
}

/* 💡 [타임스탬프] 로컬 디바이스 시간이 아닌 파이어베이스 정밀 서버 타임스탬프 탑재 */
async function saveDiaryState(diaryObj){
if(!coupleCode || !diaryObj.id) return;
diaryObj.serverCreatedAt = firebase.firestore.FieldValue.serverTimestamp();
await db.collection('couples').doc(coupleCode).collection('diaries').doc(diaryObj.id).set(diaryObj);
}

/* 💡 [권한 검증] 일기 작성 고유 권한(작성자 검증) 트랜잭션 단계 락인 처리 */
async function deleteDiaryState(diaryId){
if(!coupleCode || !diaryId) return;
const docRef = db.collection('couples').doc(coupleCode).collection('diaries').doc(diaryId);
try {
await db.runTransaction(async (transaction) => {
const docSnap = await transaction.get(docRef);
if (!docSnap.exists) return;
if (docSnap.data().author !== myRole) {
throw new Error("삭제 권한이 없습니다.");
}
transaction.delete(docRef);
});
} catch(e) {
showToast(e.message || '삭제에 실패했습니다.');
}
}

/* 💡 [동시성 수리] runTransaction() 기반 질문 답변 실시간 안전 결합 */
async function saveAnswerState(newAnswerObj){
if(!coupleCode) return;
lastLocalWriteTime = Date.now();
const docRef = db.collection('couples').doc(coupleCode);

try {
await db.runTransaction(async (transaction) => {
const docSnap = await transaction.get(docRef);
const currentAnswers = docSnap.data().answers || [];
const matchIdx = currentAnswers.findIndex(a => a.date === newAnswerObj.date && a.questionIndex === newAnswerObj.questionIndex);

if (matchIdx > -1) {
currentAnswers[matchIdx][myRole] = newAnswerObj[myRole];
} else {
currentAnswers.push(newAnswerObj);
}
transaction.update(docRef, { answers: currentAnswers });
});
} catch(e) {
console.error('답변 저장 트랜잭션 실패:', e);
}
}

function calcStreak(){
let streak=0, d=new Date();
while(true){
const ds=formatDate(d);
const has = state.diary.some(e=>e.date===ds) || state.answers.some(a=>a.date===ds);
if(has){ streak++; d.setDate(d.getDate()-1); } else break;
}
return streak;
}
function calcDday(){
const start = new Date(ANNIVERSARY.getFullYear(), ANNIVERSARY.getMonth(), ANNIVERSARY.getDate());
const now = new Date();
const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
return Math.floor((today-start)/86400000);
}

function yearProgress(){
const now = new Date(); const start = new Date(now.getFullYear(), 0, 1); const end = new Date(now.getFullYear()+1, 0, 1);
return {pct:(Math.floor((now-start)/86400000)+1 / Math.round((end-start)/86400000))*100, elapsed:Math.floor((now-start)/86400000)+1, totalDays:Math.round((end-start)/86400000), year:now.getFullYear(), month:now.getMonth()+1, date:now.getDate()};
}
function renderJourney(){
const {pct, elapsed, totalDays, year, month, date} = yearProgress(); const clamped = Math.min(97, Math.max(3, pct));
const target = document.getElementById('journeyRoot'); const caption = document.getElementById('journeyCaption');
if(!target || !caption) return;
target.innerHTML = <div class="journey-track"&gt;&lt;div class="journey-fill" style="width:${clamped}%"></div></div><div class="journey-chars" style="left:${clamped}%"&gt;&lt;span class="char rabbit"&gt;${RABBIT_SVG}</span><span class="char quokka">${QUOKKA_SVG}&lt;/span&gt;&lt;/div>;
caption.textContent = ${year}년 ${month}월 ${date}일 · 함께 걷는 ${elapsed}/${totalDays}일째 (${Math.round(pct)}%);
}

let listHtml = sorted.length===0 ? <div class="empty"&gt;아직 쓴 일기가 없어요.&lt;/div> : <div class="diary-list"&gt;&lt;h3&gt;지난 기록&lt;/h3> + sorted.map(e=>{
const mood = MOODS.find(m=>m.key===e.mood) || MOODS[0];
return <div class="entry-card"&gt;${e.photo ? <img class="entry-photo" src="${escapeHtml(e.photo)}">: ''}&lt;div class="entry-head"&gt;${avatarHtml(e.author||myRole,20)}<span class="entry-mood-dot" style="background:${mood.color}"&gt;&lt;/span&gt;&lt;span class="entry-date"&gt;${escapeHtml(roleName(e.author||myRole))} · ${displayDate(e.date)} · ${mood.emoji} ${mood.label}&lt;/span&gt;&lt;/div&gt;${e.title ? <div class="entry-title"&gt;${escapeHtml(e.title)}</div>: ''}&lt;div class="entry-content ${expandedEntries[e.id]?'':'clamped'}">${escapeHtml(e.content)}&lt;/div&gt;${e.content.length>80 ? <span class="entry-more" data-id="${e.id}" data-action="toggle">latex
{expandedEntries[e.id]?'접기':'더보기'}&lt;/span>` : ''}&lt;div class="entry-foot"&gt;

{confirmDeleteId===e.id ? <button class="btn btn-danger" data-id="${e.id}" data-action="confirmDelete">정말 삭제할까요?</button>: (e.author === myRole ?<button class="btn btn-danger" data-id="${e.id}" data-action="askDelete"&gt;삭제&lt;/button> : '')}</div>${commentsHtml(e)}&lt;/div>;
}).join('') + </div>;

return <div class="view"&gt;&lt;div class="composer"&gt;&lt;div class="moods" id="moodPicker"&gt;${MOODS.filter(m=>m.key!=='none').map(m=><button class="mood-btn ${selectedMood===m.key?'selected':''}" data-mood="${m.key}"&gt;${m.emoji}</button>).join('')}&lt;/div&gt;&lt;input type="text" id="titleInput" placeholder="제목 (선택)"&gt;&lt;textarea id="contentInput" placeholder="오늘 하루는 어땠나요?"&gt;&lt;/textarea&gt;&lt;div class="photo-row"&gt;&lt;input type="file" id="photoInput" accept="image/*" style="display:none"&gt;${selectedPhoto ? <div class="photo-preview"&gt;&lt;img src="${escapeHtml(selectedPhoto)}"><button class="photo-remove" id="removePhotoBtn" type="button">✕</button></div>:<button type="button" class="photo-add-btn" id="addPhotoBtn"><span>📷</span> 사진 추가</button>}&lt;/div&gt;&lt;div style="margin-top:12px;text-align:right;"&gt;&lt;button class="btn btn-primary" id="saveDiaryBtn"&gt;일기 저장&lt;/button&gt;&lt;/div&gt;&lt;/div&gt;${listHtml}</div>`;
}

/* 💡 [동시성 수리] runTransaction() 기반 다이어리 댓글 충돌 제어 시스템 이식 */
function bindDiaryView(){
const picker = document.getElementById('moodPicker'); if(!picker) return;
picker.addEventListener('click', (e)=>{ const btn = e.target.closest('.mood-btn'); if(btn) { selectedMood = btn.dataset.mood; render(); } });
const addBtn = document.getElementById('addPhotoBtn'); if(addBtn) addBtn.addEventListener('click', ()=>document.getElementById('photoInput').click());
const pInput = document.getElementById('photoInput');
if(pInput) pInput.addEventListener('change', async (e)=>{ if(e.target.files[0]) { try{ selectedPhoto = await resizeImage(e.target.files[0]); render(); }catch(err){ } } });
const rBtn = document.getElementById('removePhotoBtn'); if(rBtn) rBtn.addEventListener('click', ()=>{ selectedPhoto = null; render(); });

document.getElementById('saveDiaryBtn').addEventListener('click', async ()=>{
const title = document.getElementById('titleInput').value.trim(); const content = document.getElementById('contentInput').value.trim();
if(!content){ showToast('내용을 적어주세요'); return; }
const dObj = { id: 'd'+Date.now(), date: todayStr(), mood: selectedMood||MOODS[0].key, title, content, photo: selectedPhoto||null, author: myRole, comments: [] };
selectedMood = null; selectedPhoto = null;
await saveDiaryState(dObj); showToast('일기가 저장됐어요'); updateChips(); updateNavDots(); render();
});

document.querySelectorAll('[data-action]').forEach(el=>{
el.addEventListener('click', async ()=>{
const id = el.dataset.id, action = el.dataset.action;
if(action==='toggle'){ expandedEntries[id] = !expandedEntries[id]; render(); }
else if(action==='askDelete'){ confirmDeleteId = id; render(); }
else if(action==='confirmDelete'){ confirmDeleteId = null; await deleteDiaryState(id); render(); }
});
});

document.querySelectorAll('.comment-send').forEach(btn=>{
btn.addEventListener('click', async ()=>{
const entryId = btn.dataset.entry; const txt = document.querySelector(.comment-input[data-entry="${entryId}"]`).value.trim();
if(!txt) return;
const docRef = db.collection('couples').doc(coupleCode).collection('diaries').doc(entryId);
try {
await db.runTransaction(async (transaction) => {
const docSnap = await transaction.get(docRef);
if (!docSnap.exists) return;
const currentComments = docSnap.data().comments || [];
currentComments.push({ id: 'c'+Date.now(), author: myRole, text: txt, createdAt: Date.now() });
transaction.update(docRef, { comments: currentComments });
});
render();
} catch(e) { console.error(e); }
});
});
}

function renderHistoryView(){
if(!myRole) return <div class="empty"&gt;로그인 후 확인 가능합니다.&lt;/div>;
const items = [...state.diary.map(e=>({type:'diary', date:e.date, sortKey:e.id, data:e})), ...state.answers.filter(a=>a.rabbit||a.quokka).map(a=>({type:'answer', date:a.date, sortKey:a.date, data:a}))].sort((a,b)=>b.sortKey.localeCompare(a.sortKey));
const other = otherRole(myRole);

let listHtml = items.length===0 ? <div class="empty"&gt;아직 기록이 없어요.&lt;/div> : <div class="timeline"> + items.map(it=>{
if(it.type==='diary'){
const mood = MOODS.find(m=>m.key===it.data.mood) || MOODS[0];
return <div class="tl-item type-diary"&gt;&lt;div class="tl-card"&gt;${it.data.photo ? <img class="tl-photo" src="${escapeHtml(it.data.photo)}">: ''}&lt;span class="tl-date"&gt;${displayDate(it.date)}</span><div class="tl-type">{escapeHtml(roleName(it.data.author||myRole))}의 다이어리</div>latex
{it.data.title ? `<div class="tl-title"&gt;

{escapeHtml(it.data.title)}</div>: ''}&lt;div class="tl-body"&gt;${escapeHtml(it.data.content.slice(0,60))}${it.data.content.length&gt;60?'…':''}&lt;/div&gt;&lt;/div&gt;&lt;/div>;
}
if(!(it.data[myRole]||'').trim()) return <div class="tl-item type-answer"&gt;&lt;div class="tl-card"&gt;&lt;span class="tl-date"&gt;${displayDate(it.date)}</span><div class="tl-type">오늘의 질문</div><div class="tl-title">${escapeHtml(it.data.question)}&lt;/div&gt;&lt;div class="tl-answer-row" style="color:var(--muted);"&gt;🔒 답변하지 않아 볼 수 없어요&lt;/div&gt;&lt;/div&gt;&lt;/div>;
return <div class="tl-item type-answer"&gt;&lt;div class="tl-card"&gt;&lt;span class="tl-date"&gt;${displayDate(it.date)}</span><div class="tl-type">오늘의 질문</div><div class="tl-title">${escapeHtml(it.data.question)}&lt;/div&gt;&lt;div class="tl-answer-row mine"&gt;&lt;b&gt;${escapeHtml(roleName(myRole))}</b>${escapeHtml(it.data[myRole])}&lt;/div&gt;&lt;div class="tl-answer-row partner"&gt;&lt;b&gt;${escapeHtml(roleName(other))}</b>${it.data[other]?escapeHtml(it.data[other]):'아직 답변 전'}&lt;/div&gt;&lt;/div&gt;&lt;/div>;
}).join('') + </div>;

return <div class="view"&gt;&lt;div class="stats-row"&gt;&lt;div class="stat-card"&gt;&lt;div class="num"&gt;${state.diary.length}</div><div class="lbl">작성한 일기</div></div><div class="stat-card"><div class="num">${state.answers.filter(a=&gt;a.rabbit||a.quokka).length}&lt;/div&gt;&lt;div class="lbl"&gt;답변한 질문&lt;/div&gt;&lt;/div&gt;&lt;/div&gt;${listHtml}</div>`;
}

/* 💡 [최적화] 고유 선 렌더링 검증 가드 결합 */
function render(){
const root = document.getElementById('viewRoot'); if(!root) return;
if(currentView==='question'){ root.innerHTML = renderQuestionView(); bindQuestionView(); }
else if(currentView==='diary'){ root.innerHTML = renderDiaryView(); bindDiaryView(); }
else { root.innerHTML = renderHistoryView(); }
updateNavDots();
}

document.querySelectorAll('.nav button').forEach(b=>b.addEventListener('click', ()=>switchView(b.dataset.view)));
document.querySelectorAll('.tabs button').forEach(b=>{
b.addEventListener('click', ()=>{
document.querySelectorAll('.tabs button').forEach(x=>x.classList.remove('active')); b.classList.add('active');
document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
const tPanel = document.getElementById(b.dataset.tab==='new' ? 'panelNew' : 'panelJoin'); if(tPanel) tPanel.classList.add('active');
});
});

document.getElementById('genCodeBtn').addEventListener('click', async ()=>{
const btn = document.getElementById('genCodeBtn'); btn.textContent = '만드는 중...'; const code = genCode();
try{
await createCoupleDoc(code);
const panel = document.getElementById('panelNew');
if(panel) {
panel.innerHTML = <div class="code-display-big"&gt;${code}</div><p style="font-size:12px;color:var(--muted);text-align:center;margin:0 0 14px;">이 코드를 상대에게 공유해주세요</p><button class="btn btn-primary" id="startWithNewCodeBtn" type="button" style="width:100%;">다음</button>`;
document.getElementById('startWithNewCodeBtn').addEventListener('click', ()=>renderRolePickStep(code, {}));
}
}catch(e){ btn.textContent = '코드 만들기'; showToast(e.message); }
});

document.getElementById('joinCodeBtn').addEventListener('click', async ()=>{
const input = document.getElementById('joinCodeInput'); if(!input) return;
const code = input.value.trim().toUpperCase(); if(code.length < 4){ showToast('코드를 확인해주세요'); return; }
try{ const profiles = await fetchCoupleProfiles(code); renderRolePickStep(code, profiles); }catch(e){ showToast('존재하지 않는 코드예요'); }
});

(async function init(){
const navBtn = document.querySelector('.nav button[data-view="question"]'); if(navBtn) navBtn.classList.add('active');
renderJourney();
try {
const sysSnap = await db.collection('system').doc('config').get();
if(sysSnap.exists && sysSnap.data().rawQuestions) {
const parsedArray = JSON.parse(sysSnap.data().rawQuestions);
if(Array.isArray(parsedArray) && parsedArray.length > 0) { QUESTIONS.length = 0; QUESTIONS.push(...parsedArray); }
}
} catch(e) { }

const urlParams = new URLSearchParams(window.location.search);
const paramCode = urlParams.get('code'); const paramRole = urlParams.get('role');
const savedCode = paramCode || localStorage.getItem('coupleCode'); const savedRole = paramRole || localStorage.getItem('myRole');

if(savedCode && savedRole){
myRole = savedRole; localStorage.setItem('coupleCode', savedCode); localStorage.setItem('myRole', savedRole);
startApp(savedCode);
} else {
showOnboarding();
}
})();
</script>
</body>
</html>
